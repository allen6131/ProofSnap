version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: rampready-postgres
    environment:
      POSTGRES_DB: rampready
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rampready-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: rampready-api
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rampready
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      NWS_USER_AGENT: (rampready.local, contact@example.com)
      ENABLE_OPEN_METEO: "false"
      DEFAULT_REGION: tampa-bay
      ADMIN_EMAIL: admin@rampready.local
      ADMIN_PASSWORD: admin123!
      CORS_ORIGINS: http://localhost:5173,http://localhost:19006
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: rampready-worker
    command: ["python", "-m", "app.jobs.worker"]
    depends_on:
      - postgres
      - redis
      - api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rampready
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      NWS_USER_AGENT: (rampready.local, contact@example.com)
      ENABLE_OPEN_METEO: "false"
      DEFAULT_REGION: tampa-bay

  admin:
    image: node:20-alpine
    container_name: rampready-admin
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/admin:/app
    depends_on:
      - api

volumes:
  postgres_data:
